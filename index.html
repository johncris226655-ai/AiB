<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiB: Beauty Contest - System</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; color: #000; }
        #app { width: 100%; height: 100%; position: relative; }
        
        /* Intro Video */
        #intro-container { background: #fff; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9000; position: absolute; }
        video#main-video { width: 80%; max-width: 400px; display: none; border: 1px solid #000; }
        .start-btn { padding: 20px 40px; font-size: 1rem; background: #000; color: #fff; border: none; cursor: pointer; letter-spacing: 5px; font-weight: bold; }

        /* Screens */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; background: #fff; position: absolute; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }

        /* Registration UI */
        #cam { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 2px solid #000; margin-bottom: 10px; background: #eee; }
        input, select { width: 85%; padding: 12px; margin: 5px; border: 1px solid #000; background: #fff; font-size: 0.9rem; outline: none; }
        #sig-pad { border: 1px dashed #000; width: 85%; height: 80px; margin-top: 10px; background: #fafafa; }
        
        /* Number Grid */
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 90%; margin-top: 20px; }
        .num-btn { padding: 12px; background: #fff; border: 1px solid #000; font-size: 0.8rem; font-weight: bold; }
        .num-btn:active { background: #000; color: #fff; }
        
        .btn-action { width: 85%; padding: 15px; background: #000; color: #fff; font-weight: bold; border: none; margin-top: 20px; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
        #timer { font-size: 3.5rem; color: #000; font-weight: 100; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="intro-container">
        <button class="start-btn" id="init-btn" onclick="startSystem()">START TRANSMISSION</button>
        <video id="main-video" playsinline>
            <source src="https://cdn.discordapp.com/attachments/1475066979600699504/1495037802734420229/New_Project_175_61DEA48.mp4?ex=69e4c9f4&is=69e37874&hm=d37e0e827d34654edba3d526c1a08b40edd5bf38636f6f3b402bd8f9adb39d2e&" type="video/mp4">
        </video>
    </div>

    <div id="reg-screen" class="screen">
        <h3 style="letter-spacing: 3px;">CITIZEN REGISTRATION</h3>
        <video id="cam" autoplay playsinline></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button class="btn-action" style="font-size:10px; padding:8px; width: 180px;" onclick="takePhoto()">CAPTURE BIOMETRIC</button>
        
        <input type="text" id="p-name" placeholder="FULL NAME">
        <input type="date" id="p-dob" title="Birthdate">
        <select id="p-city"><option value="">SELECT CITY</option><option>Manila</option><option>Quezon City</option><option>Muntinlupa</option></select>
        <select id="p-brgy"><option value="">SELECT BARANGAY</option><option>Brgy 01</option><option>Brgy 02</option><option>Brgy 03</option></select>
        
        <canvas id="sig-pad"></canvas>
        <button class="btn-action" onclick="savePlayer()">CONFIRM IDENTIFICATION</button>
        
        <div id="start-game-box" style="display:none; width:100%; text-align:center;">
             <button class="btn-action" style="background:red; color:white;" onclick="initGame()">COMMENCE GAME</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer">05:00</div>
        <h2 id="active-p-display" style="border-bottom: 2px solid #000; padding-bottom: 5px;"></h2>
        <p style="font-size: 12px; color: #666;">CHOOSE A VALUE (0-100)</p>
        <div class="number-grid" id="grid"></div>
    </div>
</div>

<script>
    // INITIALIZE EMAILJS
    emailjs.init("Sq2dk1cU5F8dcG2WG");

    let players = [];
    let currentPlayerIndex = 0;
    let selections = {};
    let sigCanvas = document.getElementById('sig-pad');
    let ctx = sigCanvas.getContext('2d');
    let drawing = false;

    // 1. START SYSTEM & FULLSCREEN
    function startSystem() {
        document.documentElement.requestFullscreen().catch(()=>{});
        document.getElementById('init-btn').style.display = 'none';
        const v = document.getElementById('main-video');
        v.style.display = 'block'; 
        v.play();
        v.onended = () => {
            document.getElementById('intro-container').style.display = 'none';
            document.getElementById('reg-screen').classList.add('active');
            initCamera();
        };
    }

    // 2. CAMERA LOGIC
    async function initCamera() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('cam').srcObject = s;
        } catch (e) { alert("Camera access denied."); }
    }

    function takePhoto() {
        const c = document.getElementById('photo-canvas');
        c.width = 300; c.height = 300;
        c.getContext('2d').drawImage(document.getElementById('cam'), 0, 0, 300, 300);
        alert("FACIAL SCAN COMPLETE.");
    }

    // 3. SIGNATURE LOGIC
    sigCanvas.addEventListener('mousedown', () => drawing = true);
    sigCanvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    sigCanvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
    });

    // 4. SAVE PLAYER & SEND EMAIL
    function savePlayer() {
        const p = {
            id: Math.floor(1000 + Math.random() * 9000),
            name: document.getElementById('p-name').value,
            dob: document.getElementById('p-dob').value,
            loc: document.getElementById('p-city').value + ", " + document.getElementById('p-brgy').value,
            photo: document.getElementById('photo-canvas').toDataURL('image/jpeg', 0.3),
            sig: sigCanvas.toDataURL(),
            points: 0, 
            alive: true
        };

        if(!p.name) { alert("Enter Name!"); return; }

        players.push(p);
        localStorage.setItem('projectX_players', JSON.stringify(players));

        // --- EMAILJS INTEGRATION (Customized Design Trigger) ---
        emailjs.send("service_yjcswf2", "template_7nra9xd", {
            p_name: p.name,
            p_id: p.id,
            p_location: p.loc
        }).then(() => console.log("Email Sent!"), (err) => console.log("Email Failed", err));

        alert("PLAYER VERIFIED. ID: " + p.id);
        
        // Reset inputs
        document.getElementById('p-name').value = "";
        ctx.clearRect(0,0,sigCanvas.width, sigCanvas.height);
        
        if(players.length >= 2) document.getElementById('start-game-box').style.display = 'block';
    }

    // 5. GAME LOGIC
    function initGame() {
        document.getElementById('reg-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        showTurn();
    }

    function showTurn() {
        const activePlayers = players.filter(p => p.alive);
        if(currentPlayerIndex >= activePlayers.length) {
            calculateRound();
            return;
        }
        
        const p = activePlayers[currentPlayerIndex];
        document.getElementById('active-p-display').innerText = p.name;
        
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let i=0; i<=100; i++) {
            let b = document.createElement('button');
            b.className = "num-btn";
            b.innerText = i;
            b.onclick = () => {
                selections[p.id] = i;
                currentPlayerIndex++;
                showTurn();
            };
            grid.appendChild(b);
        }
    }

    function calculateRound() {
        // Simple Average * 0.8 logic
        let sum = 0;
        const activePlayers = players.filter(p => p.alive);
        activePlayers.forEach(p => sum += selections[p.id]);
        let target = (sum / activePlayers.length) * 0.8;

        alert("ROUND OVER. Target: " + target.toFixed(2));
        
        // Reset for next
        currentPlayerIndex = 0;
        selections = {};
        showTurn();
    }
</script>
</body>
</html>
