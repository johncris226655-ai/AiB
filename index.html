<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiB: Beauty Contest - System</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; color: #000; transition: background 1s; }
        #app { width: 100%; height: 100%; position: relative; }
        
        /* Intro - Plain White */
        #intro-container { background: #fff; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9000; position: absolute; }
        video { width: 90%; max-width: 600px; display: none; border: none; }
        .start-btn { padding: 20px 40px; font-size: 1.2rem; background: #000; color: #fff; border: none; cursor: pointer; letter-spacing: 5px; font-weight: bold; }

        /* General Screen Style */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; background: #000; color: #fff; position: absolute; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }

        /* Registration UI */
        #camera-feed { width: 200px; height: 150px; border: 2px solid #fff; object-fit: cover; margin-bottom: 10px; }
        input { width: 85%; padding: 12px; margin: 5px; border: 1px solid #555; background: #111; color: #fff; font-size: 1rem; }
        #sig-pad { background: #fff; width: 85%; height: 100px; margin-top: 10px; cursor: crosshair; }
        
        /* Game UI */
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; width: 90%; }
        .num-btn { padding: 15px; background: #111; color: #fff; border: 1px solid #fff; font-size: 1.1rem; }
        .num-btn:active { background: #fff; color: #000; }
        
        .btn-action { width: 85%; padding: 15px; background: #fff; color: #000; font-weight: bold; border: none; margin-top: 20px; text-transform: uppercase; cursor: pointer; }
        
        /* Cinematic Text */
        .heavy-text { font-size: 0.8rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .id-badge { font-size: 1.5rem; color: #ff0000; font-weight: bold; border: 1px solid #ff0000; padding: 5px 20px; margin: 10px 0; }
        
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .eliminating { animation: flash 0.2s infinite; background: red !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="intro-container">
        <button class="start-btn" id="init-btn" onclick="startSystem()">START TRANSMISSION</button>
        <video id="main-video" playsinline>
            <source src="https://cdn.discordapp.com/attachments/1475066979600699504/1495037802734420229/New_Project_175_61DEA48.mp4?ex=69e4c9f4&is=69e37874&hm=d37e0e827d34654edba3d526c1a08b40edd5bf38636f6f3b402bd8f9adb39d2e&" type="video/mp4">
        </video>
    </div>

    <div id="reg-screen" class="screen">
        <p class="heavy-text">CITIZEN DATA ACQUISITION</p>
        <video id="cam" autoplay playsinline></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button class="btn-action" style="font-size:0.7rem; padding:8px;" onclick="takePhoto()">CAPTURE BIOMETRICS</button>
        
        <input type="text" id="p-name" placeholder="FULL NAME">
        <input type="number" id="p-age" placeholder="AGE">
        <input type="text" id="p-brgy" placeholder="BARANGAY">
        <input type="text" id="p-city" placeholder="CITY">
        <input type="text" id="p-prov" placeholder="PROVINCE">
        
        <p style="font-size:10px; margin:15px 0 5px 0;">SIGNATURE AFFIRMATION:</p>
        <canvas id="sig-pad"></canvas>
        
        <button class="btn-action" onclick="savePlayer()">REGISTER CITIZEN</button>
        <div id="start-game-box" style="display:none; width:100%; text-align:center;">
             <button class="btn-action" style="background:red; color:white;" onclick="initGame()">COMMENCE GAME</button>
        </div>
    </div>

    <div id="turn-screen" class="screen">
        <h1 style="color:red; letter-spacing:10px;">TURN OVER</h1>
        <div id="turn-info" style="text-align:center;">
            <img id="turn-img" style="width:180px; border:3px solid #fff; margin:20px 0;">
            <h2 id="turn-name"></h2>
            <div class="id-badge" id="turn-id"></div>
        </div>
        <button class="btn-action" onclick="showGameGrid()">ENTER SELECTION</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer" style="font-size:4rem; color:red;">05:00</div>
        <p id="active-p"></p>
        <div class="number-grid" id="grid"></div>
    </div>
</div>

<audio id="click-sound" src="https://cdn.discordapp.com/attachments/1475066979600699504/1495067226858983656/virtual_vibes-okay-confirmation-379994.mp3?ex=69e4e55b&is=69e393db&hm=16c6063f6604e3cc9a9190a6909d6cdec704f1171868b8fcc766146b804ca32e&"></audio>

<script>
    emailjs.init("C2sEclrtuKZAUQ2-n");

    const vid = document.getElementById('main-video');
    const audio = document.getElementById('click-sound');
    let players = [];
    let currentPlayerIndex = 0;
    let selections = {};
    let sigCanvas = document.getElementById('sig-pad');
    let ctx = sigCanvas.getContext('2d');
    let drawing = false;

    // Start System & Fullscreen
    function startSystem() {
        document.documentElement.requestFullscreen().catch(()=>{});
        document.getElementById('init-btn').style.display = 'none';
        vid.style.display = 'block';
        vid.play();
    }

    vid.onended = () => {
        document.getElementById('intro-container').style.display = 'none';
        document.getElementById('reg-screen').classList.add('active');
        initCamera();
    };

    // Camera & Photo (50KB Compression)
    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('cam').srcObject = stream;
    }

    function takePhoto() {
        const canvas = document.getElementById('photo-canvas');
        canvas.width = 150; canvas.height = 150;
        canvas.getContext('2d').drawImage(document.getElementById('cam'), 0, 0, 150, 150);
        playClick(1);
        alert("BIOMETRIC CAPTURED");
    }

    // Signature Logic
    sigCanvas.addEventListener('mousedown', () => drawing = true);
    sigCanvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    sigCanvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
    });

    function playClick(pitch) {
        let s = audio.cloneNode();
        s.playbackRate = pitch; // Iba't ibang pitch
        s.play();
    }

    function savePlayer() {
        const id = Math.floor(1000 + Math.random() * 9000);
        const photo = document.getElementById('photo-canvas').toDataURL('image/jpeg', 0.2); // Low quality for 50KBish
        
        const p = {
            id: id,
            name: document.getElementById('p-name').value,
            age: document.getElementById('p-age').value,
            loc: `${document.getElementById('p-brgy').value}, ${document.getElementById('p-city').value}, ${document.getElementById('p-prov').value}`,
            photo: photo,
            sig: sigCanvas.toDataURL(),
            points: 0
        };

        players.push(p);
        playClick(0.8);

        // EmailJS Send
        emailjs.send("Service_yjcswf2", "template_7nra9xd", {
            p_name: p.name,
            p_id: p.id,
            p_photo: photo
        });

        // Special Link Generator (for Checker)
        const secretData = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
        console.log("DEATH LINK FOR " + p.name + ": checker.html?data=" + secretData);

        if(players.length >= 2) document.getElementById('start-game-box').style.display = 'block';
        
        // Reset inputs
        document.getElementById('p-name').value = "";
        ctx.clearRect(0,0,sigCanvas.width, sigCanvas.height);
        alert("PLAYER REGISTERED. ID: " + id);
    }

    // Game Logic
    function initGame() {
        document.getElementById('reg-screen').classList.remove('active');
        showTurnScreen();
    }

    function showTurnScreen() {
        const p = players[currentPlayerIndex];
        document.getElementById('turn-screen').classList.add('active');
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('turn-img').src = p.photo;
        document.getElementById('turn-name').innerText = p.name;
        document.getElementById('turn-id').innerText = "ID: " + p.id;
    }

    function showGameGrid() {
        document.getElementById('turn-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        document.getElementById('active-p').innerText = players[currentPlayerIndex].name + " is picking...";
        
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let i=0; i<=100; i++) {
            let b = document.createElement('button');
            b.className = "num-btn";
            b.innerText = i;
            b.onclick = () => {
                selections[players[currentPlayerIndex].id] = i;
                playClick(1.2);
                nextTurn();
            };
            grid.appendChild(b);
        }
        startTimer();
    }

    function startTimer() {
        let t = 300;
        const timerDiv = document.getElementById('timer');
        clearInterval(window.gameTimer);
        window.gameTimer = setInterval(() => {
            let m = Math.floor(t/60); let s = t%60;
            timerDiv.innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            if(--t < 0) nextTurn();
        }, 1000);
    }

    function nextTurn() {
        clearInterval(window.gameTimer);
        currentPlayerIndex++;
        if(currentPlayerIndex < players.length) {
            showTurnScreen();
        } else {
            calculateRound();
        }
    }

    function calculateRound() {
        // Beauty Contest Logic: Average of all numbers * 0.8
        let sum = 0;
        Object.values(selections).forEach(v => sum += v);
        let average = (sum / players.length) * 0.8;
        
        // Find winner (closest to average)
        let winner = players[0];
        let minDiff = Math.abs(selections[players[0].id] - average);
        
        players.forEach(p => {
            let diff = Math.abs(selections[p.id] - average);
            if(diff < minDiff) {
                minDiff = diff;
                winner = p;
            }
        });

        // Penalize losers
        players.forEach(p => {
            if(p.id !== winner.id) p.points--;
        });

        alert("ROUND OVER. Target was: " + average.toFixed(2) + "\nWinner: " + winner.name);
        
        // Reset for next round
        currentPlayerIndex = 0;
        selections = {};
        showTurnScreen();
    }
</script>
</body>
</html>
