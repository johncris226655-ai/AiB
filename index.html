<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiB: Beauty Contest</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        #app { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Intro Container */
        #intro-container { background: #fff; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 1000; position: absolute; transition: opacity 1s ease; }
        video { width: 90%; max-width: 500px; height: auto; border: none; }

        /* General Screens */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; position: absolute; }
        .active { display: flex; animation: fadeIn 0.8s forwards; }

        /* Form Elements */
        input { width: 80%; padding: 10px; margin: 5px; border: 1px solid #fff; background: #000; color: #fff; border-radius: 0; }
        #camera-feed { width: 200px; height: 150px; border: 1px solid #fff; object-fit: cover; }
        #sig-pad { background: #fff; width: 80%; height: 100px; touch-action: none; border: 1px solid #fff; }
        
        .btn { background: #000; color: #fff; border: 1px solid #fff; padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px; }
        .btn:active { background: #fff; color: #000; }
        #fs-btn { position: fixed; top: 10px; right: 10px; z-index: 2000; font-size: 10px; background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff; padding: 5px; }

        /* Game UI */
        #number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 300px; overflow-y: auto; padding: 10px; width: 90%; }
        .num-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px; font-size: 14px; }
        .num-btn:disabled { background: #555; color: #888; border: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFullScreen()">FULLSCREEN</button>

    <div id="app">
        <div id="intro-container">
            <video id="intro-vid" playsinline muted>
                <source src="https://drive.google.com/uc?export=download&id=1MKcTn8z5uIogrqMr9VP-zFL3o5vn1UdE" type="video/mp4">
            </video>
        </div>

        <div id="reg-screen" class="screen">
            <h2 style="letter-spacing: 5px;">IDENTIFICATION</h2>
            <video id="camera-feed" autoplay playsinline></video>
            <canvas id="photo-canvas" style="display:none;"></canvas>
            <button class="btn" style="font-size: 10px;" onclick="takeSnapshot()">CAPTURE FACE</button>
            <input type="text" id="reg-name" placeholder="PANGALAN">
            <input type="number" id="reg-age" placeholder="EDAD">
            <input type="text" id="reg-brgy" placeholder="BARANGAY">
            <input type="text" id="reg-city" placeholder="CITY">
            <input type="text" id="reg-prov" placeholder="PROVINCE">
            <p style="font-size: 10px; margin: 5px 0;">PIRMA (DOODLE):</p>
            <canvas id="sig-pad"></canvas>
            <button class="btn" id="reg-submit" onclick="processRegistration()">REGISTER</button>
        </div>

        <div id="turn-screen" class="screen">
            <h1 id="pass-title" style="color:red; letter-spacing:3px;">PASS THE PHONE</h1>
            <img id="turn-photo" style="width:120px; border:2px solid #fff;">
            <h2 id="turn-name"></h2>
            <p id="turn-id"></p>
            <button class="btn" onclick="startPlayerTurn()">I AM READY</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="timer-display" style="font-size: 3em; color: red; font-weight: bold;">05:00</div>
            <p id="active-player-name" style="letter-spacing: 2px;"></p>
            <div id="number-grid"></div>
        </div>
    </div>

    <audio id="success-chime" src="https://cdn.discordapp.com/attachments/1479686006952427770/1495027189232697344/soundshelfstudio-ui-success-chime-513565.mp3?ex=69e4c012&is=69e36e92&hm=2820f05dc9106f4a786869b1939450f5fd7c8614bd54d9fd6ca163ddfa21c3cb&"></audio>
    <audio id="tick-sound" src="https://www.soundjay.com/buttons/beep-07.mp3" loop></audio>

    <script>
        // CONFIGURATION
        emailjs.init("YOUR_PUBLIC_KEY"); // Palitan mo ito ng iyong EmailJS Public Key

        const introVid = document.getElementById('intro-vid');
        const introContainer = document.getElementById('intro-container');
        const sigPad = document.getElementById('sig-pad');
        const sigCtx = sigPad.getContext('2d');
        let drawing = false;
        let players = [];
        let currentPlayerIndex = 0;
        let timerInterval;

        // Intro Logic
        window.addEventListener('click', () => {
            introVid.muted = false;
            introVid.play();
        }, { once: true });

        introVid.onended = () => {
            introContainer.style.opacity = "0";
            setTimeout(() => {
                introContainer.style.display = "none";
                document.getElementById('reg-screen').classList.add('active');
                initCamera();
            }, 1000);
        };

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fs-btn').style.display = 'none';
            }
        }

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('camera-feed').srcObject = stream;
        }

        function takeSnapshot() {
            const canvas = document.getElementById('photo-canvas');
            canvas.width = 160; canvas.height = 120;
            canvas.getContext('2d').drawImage(document.getElementById('camera-feed'), 0, 0, 160, 120);
            alert("FACE CAPTURED");
        }

        // Signature Pad
        sigPad.addEventListener('pointerdown', () => drawing = true);
        sigPad.addEventListener('pointerup', () => { drawing = false; sigCtx.beginPath(); });
        sigPad.addEventListener('pointermove', (e) => {
            if (!drawing) return;
            sigCtx.lineWidth = 2;
            sigCtx.lineTo(e.offsetX, e.offsetY);
            sigCtx.stroke();
        });

        function processRegistration() {
            const id = Math.floor(1000 + Math.random() * 9000);
            const photo = document.getElementById('photo-canvas').toDataURL('image/jpeg', 0.3); // Compressed to ~50KB
            const player = {
                id: id,
                name: document.getElementById('reg-name').value,
                age: document.getElementById('reg-age').value,
                address: `${document.getElementById('reg-brgy').value}, ${document.getElementById('reg-city').value}, ${document.getElementById('reg-prov').value}`,
                photo: photo,
                sig: sigPad.toDataURL()
            };

            players.push(player);
            document.getElementById('success-chime').play();

            // EmailJS Custom Send
            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                p_id: player.id,
                p_name: player.name,
                p_photo: photo
            });

            // Special Link Generation (I-save ito para sa Checker)
            const secretData = btoa(unescape(encodeURIComponent(JSON.stringify(player))));
            console.log("IDENTITY LINK FOR CHECKER:", "checker.html?data=" + secretData);

            if(players.length >= 2) {
                const startBtn = document.createElement('button');
                startBtn.className = "btn";
                startBtn.innerText = "START GAME (" + players.length + " PLAYERS)";
                startBtn.onclick = startRound;
                document.getElementById('reg-screen').appendChild(startBtn);
            }
            
            // Reset fields
            document.getElementById('reg-name').value = "";
            sigCtx.clearRect(0,0,sigPad.width, sigPad.height);
            alert("REGISTERED! ID: " + id + "\n(I-check ang console para sa Identity Link)");
        }

        function startRound() {
            document.getElementById('reg-screen').classList.remove('active');
            showTurnOverlay();
        }

        function showTurnOverlay() {
            const player = players[currentPlayerIndex];
            document.getElementById('turn-screen').classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('turn-photo').src = player.photo;
            document.getElementById('turn-name').innerText = player.name;
            document.getElementById('turn-id').innerText = "CITIZEN ID: " + player.id;
        }

        function startPlayerTurn() {
            document.getElementById('turn-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('active-player-name').innerText = players[currentPlayerIndex].name;
            generateGrid();
            startTimer(300); // 5 minutes
            document.getElementById('tick-sound').play();
        }

        function generateGrid() {
            const grid = document.getElementById('number-grid');
            grid.innerHTML = "";
            for(let i=0; i<=100; i++) {
                const btn = document.createElement('button');
                btn.className = "num-btn";
                btn.innerText = i;
                btn.onclick = () => {
                    alert("Pinili mo ang " + i);
                    endTurn();
                };
                grid.appendChild(btn);
            }
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                document.getElementById('timer-display').textContent = 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                if (--timer < 0) endTurn();
            }, 1000);
        }

        function endTurn() {
            clearInterval(timerInterval);
            document.getElementById('tick-sound').pause();
            currentPlayerIndex++;
            if(currentPlayerIndex < players.length) {
                showTurnOverlay();
            } else {
                alert("TAPOS NA ANG ROUND!");
                location.reload(); // Restart para sa susunod na game
            }
        }
    </script>
</body>
</html>
